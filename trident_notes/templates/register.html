{% extends "base.html" %}

{% block title %}Registrazione | Comando Marittimo Tirreno{% endblock %}

{% block content %}
<p class="eyebrow">Area Riservata</p>
<h1>Nuova Registrazione</h1>
<p class="lead">Registra un nuovo identificativo operativo nel sistema.</p>

<form class="comment-form" method="post" action="{{ url_for('register') }}" style="max-width: 400px; margin-top: 2rem;">
  <label for="username">Nuovo Identificativo</label>
  <input id="username" name="username" type="text" required>

  <label for="password">Codice di Sicurezza (Password)</label>
  <input id="password" name="password" type="password" required>

  <button type="submit">Registra e Accedi</button>
</form>
{% endblock %}
