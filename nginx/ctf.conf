server {
    listen 80;
    server_name www-thehackspace.hosting.uniba.it 193.206.44.31;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /red_vs_blue/harbor_gate {
        return 302 /red_vs_blue/harbor_gate/;
    }

    location /red_vs_blue/harbor_gate/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /red_vs_blue/harbor_gate;
        proxy_redirect off;
    }

    location = /red_vs_blue/trident_notes {
	    return 302 /red_vs_blue/trident_notes/;
    }

    location /red_vs_blue/trident_notes/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /red_vs_blue/trident_notes;
        proxy_redirect off;
    }

    location = /red_vs_blue/trident_check_1 {
	    return 302 /red_vs_blue/trident_check_1/;
    }

    location /red_vs_blue/trident_check_1/ {
        proxy_pass http://127.0.0.1:8083/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /red_vs_blue/trident_check_1;
        proxy_redirect off;
    }

    location = /red_vs_blue/trident_check_2 {
	    return 302 /red_vs_blue/trident_check_2/;
    }

    location /red_vs_blue/trident_check_2/ {
        proxy_pass http://127.0.0.1:8084/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /red_vs_blue/trident_check_2;
        proxy_redirect off;
    }

    location = /css_mdo/md5 {
        alias /home/d.posa/sscss_ctf_r-b/css_mdo/CTF_CSS_MDO_MD5.html;
        default_type text/html;
    }

    location = /css_mdo/inj {
        alias /home/d.posa/sscss_ctf_r-b/css_mdo/CTF_CSS_MDO_INJ.html;
        default_type text/html;
    }

    location = /hybrid_mal {
        return 301 /hybrid_mal/;
    }

    location = /hybrid_mal/index.html {
        alias /home/d.posa/sscss_ctf_r-b/CTF-Base_Hybrid-Malaware/index.html;
        default_type text/html;
    }

    location ^~ /hybrid_mal/ {
        alias /home/d.posa/sscss_ctf_r-b/CTF-Base_Hybrid-Malaware/;
        index index.html;
    }

    location = /cyber-raid {
        return 301 /cyber-raid/;
    }

    location /cyber-raid/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /cyber-raid;

        proxy_redirect off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
