server {
    listen 80;
    server_name www-thehackspace.hosting.uniba.it 193.206.44.31;

    location = / {
        return 200 "CTF reverse proxy online\n";
        add_header Content-Type text/plain;
    }

    location = /red_vs_blue/harbor_gate {
        return 302 /red_vs_blue/harbor_gate/;
    }

    location /red_vs_blue/harbor_gate/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /red_vs_blue/harbor_gate;
        proxy_redirect off;
    }

    location = /red_vs_blue/trident_notes {
	    return 302 /red_vs_blue/trident_notes/;
    }

    location /red_vs_blue/trident_notes/ {
        proxy_pass http://127.0.0.1:8082/;
