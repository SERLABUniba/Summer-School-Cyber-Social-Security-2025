services:
  ctf-dashboard:
    build: .
    container_name: ctf-dashboard
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SECRET_KEY: "change-this-secret"
    volumes:
      - ./data:/app/data
      - ../red_vs_blue:/opt/red_vs_blue
      - ../css_mdo:/opt/css_mdo
      - ../cti:/opt/cti
    command:
      - sh
      - -c
      - |
        python init_db.py && exec gunicorn app:app \
          --bind 0.0.0.0:8080 \
          --worker-class gthread \
          --workers 2 \
          --threads 4 \
          --timeout 60 \
          --graceful-timeout 20 \
          --keep-alive 5 \
          --max-requests 1000 \
          --max-requests-jitter 100 \
          --access-logfile - \
          --error-logfile -
    restart: unless-stopped