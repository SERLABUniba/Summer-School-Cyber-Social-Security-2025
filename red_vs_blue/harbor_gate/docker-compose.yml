services:
  web:
    build: .
    container_name: naval-ctf-web
    ports:
      - "127.0.0.1:8081:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: naval_ctf
      DB_USER: ctf_user
      DB_PASSWORD: ctf_password
      FLASK_SECRET: "cambia-questa-chiave-in-produzione"
      FLAG: "SSCSS{accesso_riservato_stato_maggiore}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ctf-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: naval-ctf-db
    environment:
      POSTGRES_DB: naval_ctf
      POSTGRES_USER: ctf_user
      POSTGRES_PASSWORD: ctf_password
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctf_user -d naval_ctf"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ctf-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ctf-net:
    driver: bridge

